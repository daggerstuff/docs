info:
  title: Pixelated Empathy Memory API
  version: 1.0.0
  description:
    Public Memory API for Pixelated Empathy. See docs/api/memory-v1-contract.md
    for the full contract specification.
servers:
  - url: https://api.pixelatedempathy.com
    description: Production
paths:
  /api/v1/memory:
    get:
      operationId: listMemories
      summary: List memories
      description:
        Retrieve a paginated list of memories for the authenticated user.
      tags:
        - Memory
      parameters:
        - name: limit
          in: query
          description: Maximum results to return (1-100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
        - name: offset
          in: query
          description: Number of results to skip.
          schema:
            type: integer
            minimum: 0
          required: false
        - name: category
          in: query
          description: Filter by category.
          schema:
            type: string
            maxLength: 64
          required: false
        - name: tags
          in: query
          description: Filter by tags (comma-separated or repeated).
          schema:
            type: array
            items:
              type: string
          required: false
      responses:
        '200':
          description: Paginated list of memories.
          headers:
            X-Memory-Contract-Version:
              schema:
                type: string
              description: The memory API contract version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemoriesResponse'
        '400':
          description: Bad request.
          content:
            application/json:
