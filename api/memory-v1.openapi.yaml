  /api/v1/memory/{memoryId}:
    get:
      operationId: getMemory
      summary: Get a memory by ID
      description: Retrieve a single memory record by its UUID.
      tags:
        - Memory
      parameters:
        - &a3
          name: memoryId
          in: path
          required: true
          description: UUID of the memory.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory record.
          headers:
            X-Memory-Contract-Version:
              schema:
                type: string
              description: The memory API contract version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMemoryResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '404':
          description: Memory not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
    patch:
      operationId: updateMemory
      summary: Update a memory
      description: Update an existing memory record.
      tags:
        - Memory
      parameters:
        - *a3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemoryRequest'
      responses:
        '200':
          description: Memory updated successfully.
          headers:
            X-Memory-Contract-Version:
              schema:
                type: string
              description: The memory API contract version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMemoryResponse'
        '400':
          description: Bad request / validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '404':
          description: Memory not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '409':
          description: Conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
    delete:
      operationId: deleteMemory
      summary: Delete a memory
      description: Delete a memory record by its UUID.
      tags:
        - Memory
      parameters:
        - *a3
      responses:
        '200':
          description: Memory deleted successfully.
          headers:
            X-Memory-Contract-Version:
              schema:
                type: string
              description: The memory API contract version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMemoryResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '404':
          description: Memory not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
  /api/v1/memory/search:
    get:
      operationId: searchMemoriesGet
      summary: Search memories (query string)
      description: Search memories using a query string parameter.
      tags:
        - Memory
      parameters:
        - name: q
          in: query
          required: true
          description: Search query.
          schema:
            type: string
            minLength: 1
            maxLength: 1000
        - name: limit
          in: query
          required: false
          description: Maximum results to return (1-100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Number of results to skip.
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Search results.
          headers:
            X-Memory-Contract-Version:
              schema:
                type: string
              description: The memory API contract version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMemoriesResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
    post:
      operationId: searchMemoriesPost
      summary: Search memories (JSON body)
      description: Search memories using a JSON request body.
      tags:
        - Memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMemoriesRequest'
      responses:
        '200':
          description: Search results.
          headers:
            X-Memory-Contract-Version:
              schema:
                type: string
              description: The memory API contract version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMemoriesResponse'
        '400':
          description: Bad request / validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryApiError'
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie for authentication.
  schemas:
    MemoryScope:
      type: string
      enum:
        - session
        - arc
        - trait
        - fact
      description: Logical lifecycle boundary of a memory.
    RetentionPolicy:
      type: string
      enum:
        - ephemeral
        - short_term
        - long_term
        - permanent
      description: Retention / eviction policy.
    MemoryApiScope:
      type: string
      enum:
        - product
        - developer
      description: API scope dimension.
    MemoryApiRole:
      type: string
      enum:
        - owner
        - clinician
        - member
        - observer
      description: Role within the workspace scope.
    IdentityScope:
      type: object
      properties:
        workspaceId:
          type: string
          description: Workspace identifier.
          minLength: 1
        userId:
          type: string
          description: User identifier.
          minLength: 1
        scope:
          $ref: '#/components/schemas/MemoryApiScope'
        role:
          $ref: '#/components/schemas/MemoryApiRole'
      additionalProperties: false
      description:
        Identity and scope envelope resolved from the authenticated session.
    PublicMemory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID v4 — globally unique.
        content:
          type: string
          description: The memory content.
          minLength: 1
          maxLength: 64000
        scope:
          $ref: '#/components/schemas/MemoryScope'
        retention:
          $ref: '#/components/schemas/RetentionPolicy'
        category:
          type: string
          description: Free-form category for filtering.
          minLength: 1
          maxLength: 64
        tags:
          type: array
          description: Free-form tags for ad-hoc filtering.
          items:
            type: string
            minLength: 1
            maxLength: 64
          maxItems: 64
        version:
          type: integer
          description: Monotonically increasing version counter.
          minimum: 0
        importance:
          type: number
          description: Current importance score (0.0 → 1.0).
          minimum: 0
          maximum: 1
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 — when this memory was first created.
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 — when this memory was last mutated.
      additionalProperties: false
      description:
        A public memory record — strict subset of the internal UnifiedMemory
        type.
    Pagination:
      type: object
      properties:
        limit:
          type: integer
          description: Maximum items per page.
          minimum: 1
        offset:
          type: integer
          description: Number of items skipped.
          minimum: 0
        total:
          type: integer
          description: Total number of items matching the query.
          minimum: 0
      additionalProperties: false
      description: Pagination metadata.
    MemoryApiErrorCode:
      type: string
      enum:
        - bad_request
        - validation_failed
        - unauthorized
        - forbidden
        - not_found
        - conflict
        - payload_too_large
        - rate_limited
        - gate_blocked
        - internal_error
        - upstream_unavailable
        - upstream_timeout
      description: Stable machine-readable error codes.
    MemoryApiError:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code.
          minLength: 1
        message:
          type: string
          description: Human-readable error message.
          minLength: 1
        code:
          $ref: '#/components/schemas/MemoryApiErrorCode'
          description: Canonical error code.
        details:
          type: object
          description: Additional error details.
          additionalProperties: true
        requestId:
          type: string
          description: Request identifier for debugging.
      additionalProperties: false
      description: Canonical error envelope returned on failure.
    CreateMemoryRequest:
      type: object
      properties:
        content:
          type: string
          description: The memory content.
          minLength: 1
          maxLength: 64000
        scope:
          $ref: '#/components/schemas/MemoryScope'
        retention:
          $ref: '#/components/schemas/RetentionPolicy'
        category:
          type: string
          description: Free-form category.
          minLength: 1
          maxLength: 64
        tags:
          type: array
          description: Free-form tags.
          items:
            type: string
            minLength: 1
            maxLength: 64
          maxItems: 64
        importance:
          type: number
          description: Initial importance score (0.0 → 1.0).
          minimum: 0
          maximum: 1
      additionalProperties: false
      required:
        - content
      description: Request body for creating a memory.
    UpdateMemoryRequest:
      type: object
      properties:
        content:
          type: string
          description: The memory content.
          minLength: 1
          maxLength: 64000
        scope:
          $ref: '#/components/schemas/MemoryScope'
        retention:
          $ref: '#/components/schemas/RetentionPolicy'
        category:
          type: string
          description: Free-form category.
          minLength: 1
          maxLength: 64
        tags:
          type: array
          description: Free-form tags.
          items:
            type: string
            minLength: 1
            maxLength: 64
          maxItems: 64
        importance:
          type: number
          description: Updated importance score (0.0 → 1.0).
          minimum: 0
          maximum: 1
      additionalProperties: false
      required:
        - content
      description: Request body for updating a memory.
    SearchMemoriesRequest:
      type: object
      properties:
        q:
          type: string
          description: Search query string.
          minLength: 1
          maxLength: 1000
        limit:
          type: integer
          description: Maximum results to return.
          minimum: 1
          maximum: 100
        offset:
          type: integer
          description: Number of results to skip.
          minimum: 0
      additionalProperties: false
      required:
        - q
      description: Request body for searching memories.
    CreateMemoryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PublicMemory'
        identity:
          $ref: '#/components/schemas/IdentityScope'
      additionalProperties: false
      description: Response for creating a memory.
    GetMemoryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PublicMemory'
        identity:
          $ref: '#/components/schemas/IdentityScope'
      additionalProperties: false
      description: Response for getting a memory.
    UpdateMemoryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PublicMemory'
        identity:
          $ref: '#/components/schemas/IdentityScope'
      additionalProperties: false
      description: Response for updating a memory.
    DeleteMemoryResponse:
      type: object
      properties:
        data:
          type: object
          description: Contains the id of the deleted memory.
          properties:
            id:
              type: string
              format: uuid
              description: UUID of the deleted memory.
          additionalProperties: false
        identity:
          $ref: '#/components/schemas/IdentityScope'
      additionalProperties: false
      description: Response for deleting a memory.
    ListMemoriesResponse:
      type: object
      properties:
        data:
          type: array
          description: Array of memory records.
          items:
            $ref: '#/components/schemas/PublicMemory'
        pagination:
          $ref: '#/components/schemas/Pagination'
        identity:
          $ref: '#/components/schemas/IdentityScope'
      additionalProperties: false
      description: Response for listing memories.
    SearchMemoriesResponse:
      type: object
      properties:
        data:
          type: array
          description: Array of matching memory records.
          items:
            $ref: '#/components/schemas/PublicMemory'
        query:
          type: string
          description: The search query that produced these results.
        pagination:
          $ref: '#/components/schemas/Pagination'
        identity:
          $ref: '#/components/schemas/IdentityScope'
      additionalProperties: false
      description: Response for searching memories.
security:
  - SessionCookie: []
